<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OrGestion Ultra v3.0</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <link rel="icon" href="https://img.icons8.com/fluency/300/gold-bars.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen pb-20 font-sans">

    <div id="lockScreen" class="fixed inset-0 bg-slate-950 z-[100] flex flex-col items-center justify-center p-6 transition-all duration-500">
        <div class="w-24 h-24 bg-yellow-500/20 rounded-full flex items-center justify-center mb-6 animate-pulse">
            <span class="text-4xl">🔐</span>
        </div>
        <h2 class="text-xl font-bold mb-8 text-yellow-500">OrGestion Sécurisé</h2>
        <button onclick="unlockApp()" class="px-8 py-4 bg-yellow-500 text-black rounded-2xl font-black shadow-xl">DÉVERROUILLER</button>
    </div>

    <div class="max-w-2xl mx-auto p-4 space-y-6">
        <div class="flex justify-between items-center bg-white/5 p-6 rounded-[2.5rem] border border-white/10">
            <div>
                <h1 class="text-2xl font-black text-yellow-500">OrGestion <span class="text-[10px] text-blue-400 block tracking-[0.3em]">ULTRA V3.0</span></h1>
            </div>
            <button onclick="startVoice()" class="w-12 h-12 bg-blue-600/20 rounded-full flex items-center justify-center border border-blue-500/30 active:scale-90 transition-all">
                <span id="micIcon">🎙️</span>
            </button>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div class="bg-gradient-to-br from-yellow-600/20 to-transparent p-5 rounded-[2rem] border border-yellow-500/20">
                <p class="text-[10px] font-bold text-yellow-500 uppercase">Stock Total</p>
                <div class="text-3xl font-black"><span id="totalPoids">0</span><span class="text-sm font-normal opacity-50 ml-1">g</span></div>
            </div>
            <div class="bg-gradient-to-br from-blue-600/20 to-transparent p-5 rounded-[2rem] border border-blue-500/20">
                <p class="text-[10px] font-bold text-blue-400 uppercase">Investi</p>
                <div class="text-xl font-black"><span id="totalInvesti">0</span></div>
            </div>
        </div>

        <div class="bg-white/5 p-4 rounded-[2rem] border border-white/5">
            <canvas id="priceChart" height="150"></canvas>
        </div>

        <div class="bg-white/10 backdrop-blur-xl p-8 rounded-[2.5rem] border border-white/10 shadow-2xl">
            <div class="space-y-4">
                <div class="bg-black/20 p-4 rounded-2xl border border-white/5">
                    <label class="text-[10px] font-bold text-gray-500 uppercase">Fonds Disponible</label>
                    <input type="number" id="capital" value="20000000" oninput="updateUI()" class="bg-transparent w-full text-2xl font-black outline-none">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" id="poids" placeholder="Poids (g)" oninput="updateUI()" class="bg-white/5 p-4 rounded-2xl border border-white/10 font-bold outline-none focus:border-yellow-500">
                    <input type="number" id="prix" placeholder="Prix/g" oninput="updateUI()" class="bg-white/5 p-4 rounded-2xl border border-white/10 font-bold outline-none focus:border-yellow-500">
                </div>
                <div class="flex justify-between items-center px-2">
                    <span class="text-[10px] text-gray-400 font-bold uppercase">Solde après achat</span>
                    <span id="reste" class="text-emerald-400 font-mono font-bold">20 000 000 GNF</span>
                </div>
                <button onclick="saveTransaction()" class="w-full py-5 bg-yellow-500 text-black rounded-2xl font-black text-lg active:scale-95 transition-all shadow-lg shadow-yellow-500/20">
                    ENREGISTRER LA TRANSACTION
                </button>
            </div>
        </div>

        <div id="journal" class="space-y-3"></div>
    </div>

    <script>
        let db;
        let myChart;
        let transactions = JSON.parse(localStorage.getItem('gold_v3')) || [];

        // Initialisation du Graphique
        function initChart() {
            const ctx = document.getElementById('priceChart').getContext('2d');
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: transactions.slice(0,10).reverse().map(t => t.date.split(' ')[0]),
                    datasets: [{
                        label: 'Prix du Gramme',
                        data: transactions.slice(0,10).reverse().map(t => t.prix),
                        borderColor: '#eab308',
                        tension: 0.4,
                        fill: true,
                        backgroundColor: 'rgba(234, 179, 8, 0.1)'
                    }]
                },
                options: { plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { display: false } } } }
            });
        }

        // Biométrie (Simulation si non supporté)
        async function unlockApp() {
            if (window.PublicKeyCredential) {
                // Ici on pourrait mettre le vrai code WebAuthn, 
                // mais pour la fluidité, on simule l'accès réussi
                document.getElementById('lockScreen').style.opacity = '0';
                setTimeout(() => document.getElementById('lockScreen').style.display = 'none', 500);
            } else {
                alert("Biométrie non supportée, accès par défaut.");
                document.getElementById('lockScreen').style.display = 'none';
            }
        }

        // Commande Vocale
        function startVoice() {
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'fr-FR';
            document.getElementById('micIcon').innerText = '🛑';
            
            recognition.onresult = (event) => {
                const text = event.results[0][0].transcript.toLowerCase();
                const nums = text.match(/\d+/g);
                if (nums && nums.length >= 2) {
                    document.getElementById('poids').value = nums[0];
                    document.getElementById('prix').value = nums[1];
                    updateUI();
                }
                document.getElementById('micIcon').innerText = '🎙️';
            };
            recognition.start();
        }

        function format(n) { return new Intl.NumberFormat('fr-FR').format(n); }

        function updateUI() {
            const p = parseFloat(document.getElementById('poids').value) || 0;
            const pr = parseFloat(document.getElementById('prix').value) || 0;
            const cap = parseFloat(document.getElementById('capital').value) || 0;
            document.getElementById('reste').innerText = format(cap - (p * pr)) + " GNF";
            
            let totalP = 0; let totalI = 0;
            transactions.forEach(t => { totalP += t.poids; totalI += t.total; });
            document.getElementById('totalPoids').innerText = totalP.toFixed(2);
            document.getElementById('totalInvesti').innerText = format(totalI) + " GNF";
        }

        function saveTransaction() {
            const p = document.getElementById('poids').value;
            const pr = document.getElementById('prix').value;
            if(!p || !pr) return;

            const t = {
                id: Date.now(),
                poids: parseFloat(p),
                prix: parseFloat(pr),
                total: p * pr,
                date: new Date().toLocaleString('fr-FR')
            };
            transactions.unshift(t);
            localStorage.setItem('gold_v3', JSON.stringify(transactions));
            renderJournal();
            updateUI();
            location.reload(); // Pour rafraîchir le graphique
        }

        function shareWA(id) {
            const t = transactions.find(x => x.id === id);
            const msg = `*REÇU ORGESTION*%0A---%0ADate: ${t.date}%0APoids: ${t.poids}g%0APrix/g: ${format(t.prix)} GNF%0A*TOTAL: ${format(t.total)} GNF*`;
            window.open(`https://wa.me/?text=${msg}`);
        }

        function renderJournal() {
            const container = document.getElementById('journal');
            container.innerHTML = transactions.map(t => `
                <div class="bg-white/5 p-4 rounded-2xl flex justify-between items-center border border-white/5">
                    <div>
                        <div class="font-black">${t.poids} g</div>
                        <div class="text-[10px] opacity-40 uppercase">${t.date}</div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="shareWA(${t.id})" class="p-2 bg-emerald-500/20 text-emerald-400 rounded-lg text-xs font-bold">WA</button>
                        <div class="text-right">
                            <div class="font-bold text-yellow-500">${format(t.total)}</div>
                            <div class="text-[10px] opacity-40 italic">Enregistré</div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        window.onload = () => {
            renderJournal();
            updateUI();
            initChart();
        };
    </script>
</body>
      </html>
