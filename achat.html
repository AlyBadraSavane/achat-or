<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>OrGestion Pro - ArtisansGN</title>

    <link rel="manifest" href="manifest.json?v=100">
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/AlyaBadr/icons/main/or_logo_premium.png?v=100">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/AlyaBadr/icons/main/or_logo_premium.png?v=100">

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#050a15">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        body { 
            background: radial-gradient(circle at 50% 0%, #1e293b 0%, #050a15 100%);
            color: #f1f5f9; font-family: 'Inter', sans-serif; margin: 0; min-height: 100vh;
        }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .input-gold { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); text-align: center; font-weight: 900; color: white; }
    </style>
</head>
<body class="p-4">

    <div class="max-w-4xl mx-auto">
        <header class="glass-card rounded-3xl p-6 mb-6 flex justify-between items-center">
            <div>
                <h1 class="text-yellow-500 text-2xl font-black italic">OrGestion</h1>
                <p class="text-[10px] opacity-50 uppercase font-bold tracking-widest">v2.0 Premium - ArtisansGN</p>
            </div>
            <div class="text-right">
                <p class="text-[10px] opacity-50 uppercase font-bold" id="currentDate">DIMANCHE 26 AVRIL</p>
            </div>
        </header>

        <div class="bg-blue-600/20 border border-blue-500/30 rounded-3xl p-8 mb-6 text-center">
            <p class="text-[10px] font-bold text-blue-400 uppercase mb-2">Fonds Disponibles (GNF)</p>
            <div class="text-4xl font-black tracking-tighter" id="capitalRestant">0 GNF</div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
            <div class="glass-card p-6 rounded-3xl text-center">
                <p class="text-[10px] opacity-40 uppercase font-bold mb-1">Poids (G)</p>
                <input type="number" id="poids" step="0.01" class="w-full input-gold py-4 rounded-2xl text-2xl outline-none focus:border-yellow-500" placeholder="0.00">
            </div>
            <div class="glass-card p-6 rounded-3xl text-center">
                <p class="text-[10px] opacity-40 uppercase font-bold mb-1">Prix / G</p>
                <input type="number" id="prix" class="w-full input-gold py-4 rounded-2xl text-2xl outline-none focus:border-yellow-500" placeholder="0">
            </div>
        </div>

        <button onclick="saveToCloud()" class="w-full bg-yellow-500 text-black font-black py-5 rounded-3xl shadow-2xl mb-6 active:scale-95 transition-transform uppercase">Enregistrer l'achat</button>

        <div class="glass-card rounded-3xl p-6 mb-6">
            <div class="flex justify-between items-center border-b border-white/5 pb-4 mb-4">
                <span class="text-[10px] font-bold opacity-40 uppercase">Reste Estimé</span>
                <span class="text-xl font-black text-green-400" id="totalInvesti">0 GNF</span>
            </div>
            <div class="flex justify-between items-center">
                <span class="text-[10px] font-bold opacity-40 uppercase">Stock Physique</span>
                <span class="text-xl font-black text-yellow-500"><span id="totalPoids">0</span>g</span>
            </div>
        </div>

        <div id="journal" class="space-y-3"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBehXJCKBiigdB9FKr44RnRA4TpNgd8vPU",
            authDomain: "orgestion.firebaseapp.com",
            databaseURL: "https://orgestion-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "orgestion",
            storageBucket: "orgestion.firebasestorage.app",
            messagingSenderId: "235790975064",
            appId: "1:235790975064:web:a305690bc58232ae250a2d"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const fGNF = (n) => new Intl.NumberFormat('fr-FR').format(n).replace(/\s/g, ' ') + " GNF";

        let capInitial = 20000000; // Par défaut selon ta capture
        let invTotal = 0;

        // Récupérer le budget depuis Firebase
        db.ref('config/capitalInitial').on('value', (snap) => {
            if(snap.val()) capInitial = snap.val();
            updateBalanceUI();
        });

        db.ref('achats').on('value', (snapshot) => {
            window.lastData = snapshot.val();
            renderTransactions();
        });

        function saveToCloud() {
            const p = parseFloat(document.getElementById('poids').value);
            const pr = parseFloat(document.getElementById('prix').value);
            if(!p || !pr) return;
            db.ref('achats').push({
                poids: p, prix: pr, total: p * pr,
                date: new Date().toLocaleDateString('fr-FR', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' })
            });
            document.getElementById('poids').value = ''; document.getElementById('prix').value = '';
        }

        function updateBalanceUI() {
            const rest = capInitial - invTotal;
            document.getElementById('capitalRestant').innerText = fGNF(rest);
        }

        function renderTransactions() {
            const data = window.lastData;
            const container = document.getElementById('journal');
            let weight = 0, spent = 0, html = '';
            if (data) {
                Object.keys(data).reverse().forEach(key => {
                    const t = data[key];
                    weight += t.poids; spent += t.total;
                    html += `<div class="glass-card p-4 rounded-2xl flex justify-between items-center border-l-2 border-yellow-500">
                        <div><p class="font-black text-white">${t.poids}g</p><p class="text-[8px] opacity-30 uppercase">${t.date}</p></div>
                        <div class="text-right"><p class="text-yellow-500 font-bold">${fGNF(t.total)}</p></div>
                    </div>`;
                });
                invTotal = spent;
                document.getElementById('totalPoids').innerText = weight.toFixed(2);
                document.getElementById('totalInvesti').innerText = fGNF(spent);
                updateBalanceUI();
                container.innerHTML = html;
            }
        }
        
        // Mise à jour de la date
        const options = { weekday: 'long', day: 'numeric', month: 'long' };
        document.getElementById('currentDate').innerText = new Date().toLocaleDateString('fr-FR', options).toUpperCase();
    </script>
</body>
</html>
